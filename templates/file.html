<article class="py-6">
  <header class="mb-10 pb-8">
    <div class="mb-4 flex items-center gap-4">
      <span class="font-mono text-xs tracking-widest text-accent-600 uppercase"
        >// archivo</span
      >
      <span
        class="h-px flex-1 bg-gradient-to-r from-accent-200/50 to-transparent"></span>
    </div>
    $if(title)$
    <h1 class="text-4xl font-bold tracking-tight text-zinc-900 lg:text-5xl">
      $title$
    </h1>
    $endif$ $if(author)$
    <div class="mt-4 flex items-center gap-2 font-mono text-sm">
      <span class="text-accent-300">↳</span>
      $if(author-href)$
      <a href="$author-href$" class="text-accent-700 no-underline transition-colors hover:text-accent-600">$author$</a>
      $else$
      <span class="text-accent-700">$author$</span>
      $endif$
    </div>
    $endif$
    <div
      class="mt-6 h-px bg-gradient-to-r from-accent-400/40 via-accent-200/20 to-transparent"></div>
  </header>
  <div class="prose prose-accent lg:prose-lg max-w-none">$body$</div>
  $if(download-pdf)$
  <div class="mt-8 flex flex-wrap gap-3 border-t border-zinc-100 pt-6 font-mono text-xs">
    <a href="$download-pdf$" class="inline-flex items-center gap-1.5 rounded border border-accent-200 bg-accent-50 px-3 py-1.5 text-accent-700 transition-colors hover:bg-accent-100" download>↓ PDF</a>
    $if(download-epub)$
    <a href="$download-epub$" class="inline-flex items-center gap-1.5 rounded border border-accent-200 bg-accent-50 px-3 py-1.5 text-accent-700 transition-colors hover:bg-accent-100" download>↓ EPUB</a>
    $endif$
  </div>
  $endif$
</article>
