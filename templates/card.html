<div

  <span
    class="pointer-events-none absolute top-0 left-0 h-3 w-3 border-t border-l border-emerald-400/50"></span>
  <span
    class="pointer-events-none absolute top-0 right-0 h-3 w-3 border-t border-r border-emerald-400/50"></span>
  <span
    class="pointer-events-none absolute bottom-0 left-0 h-3 w-3 border-b border-l border-emerald-400/50"></span>
  <span
    class="pointer-events-none absolute right-0 bottom-0 h-3 w-3 border-r border-b border-emerald-400/50"></span>
  <div
    class="mb-2 font-mono text-xs font-bold tracking-widest text-emerald-600 uppercase">
    >> $title$
  </div>
  <div class="prose prose-emerald prose-sm max-w-none text-zinc-600">
    $body$
  </div>
</div>
