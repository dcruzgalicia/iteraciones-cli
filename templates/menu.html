<div class="space-y-8 py-6">
  <header class="border-b border-zinc-100 pb-8">
    <div
      class="font-mono text-xs font-bold tracking-widest text-zinc-400 uppercase">
      Menú
    </div>
    $if(title)$
    <h1
      class="mt-3 text-4xl font-bold tracking-tight text-zinc-900 lg:text-5xl">
      $title$
    </h1>
    $endif$ $if(body)$
    <div class="prose prose-zinc lg:prose-lg mt-6 max-w-none">$body$</div>
    $endif$
  </header>

  $if(menu-items)$
  <div>
    <div
      class="mb-5 font-mono text-xs font-bold tracking-widest text-zinc-400 uppercase">
      Navegación
    </div>
    <div class="divide-y divide-zinc-100">
      $for(menu-items)$
      <div class="py-4 first:pt-0">
        $if(link)$
        <a
          href="$link$"
          class="block font-semibold tracking-tight text-zinc-900 no-underline transition-colors hover:text-zinc-600"
          >$label$</a
        >
        $else$
        <div class="font-semibold tracking-tight text-zinc-900">
          $label$
        </div>
        $endif$ $if(nav)$
        <div class="mt-2 space-y-1 pl-4 text-sm text-zinc-500">
          $for(nav)$
          <div>
            $if(link)$
            <a
              href="$link$"
              class="block no-underline transition-colors hover:text-zinc-600"
              >$label$</a
            >
            $else$
            <div>$label$</div>
            $endif$
          </div>
          $endfor$
        </div>
        $endif$
      </div>
      $endfor$
    </div>
  </div>
  $else$
  <div
    class="rounded-xl border border-dashed border-zinc-200 px-5 py-8 text-center font-mono text-sm text-zinc-400">
    No hay elementos de navegación para mostrar.
  </div>
  $endif$
</div>
