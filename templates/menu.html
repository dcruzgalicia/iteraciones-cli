<div class="space-y-8 py-6">
  <header class="border-b border-lime-200/40 pb-8">
    <div
      class="font-mono text-xs font-bold tracking-widest text-lime-600 uppercase">
      // Índice
    </div>
    $if(title)$
    <h1
      class="mt-3 text-4xl font-bold tracking-tight text-zinc-900 lg:text-5xl">
      $title$
    </h1>
    $endif$ $if(body)$
    <div class="prose prose-lime lg:prose-lg mt-6 max-w-none">$body$</div>
    $endif$
  </header>

  $if(menu-items)$
  <div>
    <div
      class="mb-5 font-mono text-xs font-bold tracking-widest text-lime-600 uppercase">
      >> Navegación
    </div>
    <div class="divide-y divide-lime-200/50">
      $for(menu-items)$
      <div class="py-4 first:pt-0">
        $if(link)$
        <a
          href="$link$"
          class="group flex items-center gap-2 font-mono font-semibold text-lime-700 no-underline transition-colors hover:text-lime-600">
          <span
            class="text-lime-300 transition-colors group-hover:text-lime-600"
            >▸</span
          >
          $label$
        </a>
        $else$
        <div class="font-mono font-semibold tracking-tight text-zinc-600">
          $label$
        </div>
        $endif$ $if(nav)$
        <div class="mt-2 space-y-1 pl-5 font-mono text-sm text-zinc-400">
          $for(nav)$
          <div>
            $if(link)$
            <a
              href="$link$"
              class="flex items-center gap-2 no-underline transition-colors hover:text-lime-700">
              <span class="text-lime-200">·</span>
              $label$
            </a>
            $else$
            <div class="text-zinc-400">$label$</div>
            $endif$
          </div>
          $endfor$
        </div>
        $endif$
      </div>
      $endfor$
    </div>
  </div>
  $else$
  <div
    class="border border-dashed border-lime-200/40 px-5 py-8 text-center font-mono text-sm text-zinc-400">
    [ Sin elementos de navegación ]
  </div>
  $endif$
</div>
