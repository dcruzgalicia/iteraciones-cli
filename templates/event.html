<article class="py-6">
  <header class="mb-10 pb-8">
    <div class="mb-4 flex items-center gap-4">
      <span class="font-mono text-xs tracking-widest text-emerald-600 uppercase"
        >// evento</span
      >
      <span
        class="h-px flex-1 bg-gradient-to-r from-emerald-200/50 to-transparent"></span>
    </div>
    $if(title)$
    <h1 class="text-4xl font-bold tracking-tight text-zinc-900 lg:text-5xl">
      $title$
    </h1>
    $endif$ $if(author)$
    <div class="mt-4 flex items-center gap-2 font-mono text-sm">
      <span class="text-emerald-300">↳</span>
      <span class="text-emerald-700">$author$</span>
    </div>
    $endif$
    <div
      class="mt-6 h-px bg-gradient-to-r from-emerald-400/40 via-emerald-200/20 to-transparent"></div>
  </header>
  $if(body)$
  <div class="prose prose-emerald lg:prose-lg max-w-none">
    $body$
  </div>
  $endif$ $if(speakers)$
  <div class="mt-10 space-y-0">
    <div
      class="mb-4 font-mono text-xs font-bold tracking-widest text-emerald-600 uppercase">
      >> Participan
    </div>
    <div class="divide-y divide-emerald-200/50">
      $for(speakers)$
      <div class="group flex items-start gap-6 py-4 first:pt-0">
        <div class="min-w-0 flex-1">
          <div class="flex items-center gap-2">
            <span class="font-mono text-emerald-300">▸</span>
            $if(href)$
            <a
              href="$href$"
              class="font-semibold tracking-tight text-zinc-700 no-underline transition-colors hover:text-emerald-700">
              $title$
            </a>
            $else$
            <div class="font-semibold tracking-tight text-zinc-500">
              $title$
            </div>
            $endif$
          </div>
          $if(body)$
          <div class="mt-1 pl-4 text-sm leading-relaxed text-zinc-400">
            $body$
          </div>
          $endif$
        </div>
      </div>
      $endfor$
    </div>
  </div>
  $endif$
</article>
