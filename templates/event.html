<article class="py-6">
  <header class="mb-8 border-b border-zinc-100 pb-8">
    <div class="mb-3 font-mono text-xs font-semibold tracking-widest text-zinc-400 uppercase">
      Evento
    </div>
    $if(title)$
    <h1 class="text-4xl font-bold tracking-tight text-zinc-900 lg:text-5xl">
      $title$
    </h1>
    $endif$ $if(author)$
    <div class="mt-3 font-mono text-sm text-zinc-500">$author$</div>
    $endif$
  </header>
  $if(body)$
  <div class="prose prose-zinc lg:prose-lg max-w-none">$body$</div>
  $endif$ $if(speakers)$
  <div class="mt-10 divide-y divide-zinc-100">
    <div class="mb-4 font-mono text-xs font-semibold tracking-widest text-zinc-400 uppercase">
      Participan
    </div>
    $for(speakers)$
    <div class="flex items-start justify-between gap-6 py-5 first:pt-0">
      <div class="min-w-0 flex-1">
        $if(href)$
        <a
          href="$href$"
          class="font-semibold tracking-tight text-zinc-900 no-underline hover:text-zinc-600">
          $title$
        </a>
        $else$
        <div class="font-semibold tracking-tight text-zinc-900">
          $title$
        </div>
        $endif$ $if(body)$
        <div class="mt-1 text-sm leading-relaxed text-zinc-500">
          $body$
        </div>
        $endif$
      </div>
    </div>
    $endfor$
  </div>
  $endif$
</article>
