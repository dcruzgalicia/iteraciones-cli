<div class="space-y-8 py-6">
  $if(title)$
  <div class="mb-2 border-b border-zinc-200 pb-6">
    <div class="mb-2 font-mono text-xs tracking-widest text-zinc-400 uppercase">
      // autora/or
    </div>
    <h1 class="text-4xl font-bold tracking-tight text-zinc-900">$title$</h1>
  </div>
  $endif$ $if(body)$
  <div class="prose prose-zinc lg:prose-lg max-w-none">$body$</div>
  $endif$ $if(list-items)$
  <div class="space-y-0">
    <div
      class="mb-4 font-mono text-xs font-bold tracking-widest text-zinc-400 uppercase">
      Publicaciones
    </div>
    <div class="divide-y divide-zinc-100">
      $for(list-items)$
      <a
        href="$href$"
        class="group flex items-start justify-between gap-6 py-4 no-underline first:pt-0">
        <div class="min-w-0 flex-1">
          <div
            class="font-semibold tracking-tight text-zinc-900 group-hover:text-zinc-600">
            $title$
          </div>
          $if(author)$
          <div class="mt-0.5 font-mono text-xs text-zinc-400">
            ↳ $author$
          </div>
          $endif$
        </div>
        <div class="shrink-0 font-mono text-xs text-zinc-400">
          $date$
        </div>
      </a>
      $endfor$
    </div>
  </div>
  $else$
  <div
    class="rounded-xl border border-dashed border-zinc-200 px-5 py-8 text-center font-mono text-sm text-zinc-400">
    No hay publicaciones todavía.
  </div>
  $endif$
</div>
