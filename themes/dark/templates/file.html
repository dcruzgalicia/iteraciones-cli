<article class="py-6">
  <header class="mb-10 pb-8">
    <div class="mb-4 flex items-center gap-4">
      <span class="font-mono text-xs tracking-widest text-accent-600 uppercase"
        >// archivo</span
      >
      <span
        class="h-px flex-1 bg-gradient-to-r from-accent-800/50 to-transparent"></span>
    </div>
    $if(title)$
    <h1 class="text-4xl font-bold tracking-tight text-stone-100 lg:text-5xl">
      $title$
    </h1>
    $endif$ $if(author)$
    <div class="mt-4 flex items-center gap-2 font-mono text-sm">
      <span class="text-accent-700">↳</span>
      $if(author-href)$
      <a href="$author-href$" class="text-accent-400 no-underline transition-colors hover:text-accent-300">$author$</a>
      $else$
      <span class="text-accent-400">$author$</span>
      $endif$
    </div>
    $endif$
    <div
      class="mt-6 h-px bg-gradient-to-r from-accent-700/40 via-accent-900/20 to-transparent"></div>
  </header>
  <div class="prose prose-invert prose-accent lg:prose-lg max-w-none">
    $body$
  </div>
</article>
