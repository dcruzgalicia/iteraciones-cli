<div class="space-y-8 py-6">
  <header class="mb-2">
    <div class="mb-4 flex items-center gap-4">
      <span class="font-mono text-xs tracking-widest text-accent-600 uppercase"
        >// autora/or</span
      >
      <span
        class="h-px flex-1 bg-gradient-to-r from-accent-800/50 to-transparent"></span>
    </div>
    $if(title)$
    <h1 class="text-4xl font-bold tracking-tight text-stone-100 lg:text-5xl">
      $title$
    </h1>
    <div
      class="mt-6 h-px bg-gradient-to-r from-accent-700/40 via-accent-900/20 to-transparent"></div>
    $endif$
  </header>
  $if(body)$
  <div class="prose prose-invert prose-lime lg:prose-lg max-w-none">
    $body$
  </div>
  $endif$ $if(list-items)$
  <div class="space-y-0">
    <div
      class="mb-4 font-mono text-xs font-bold tracking-widest text-accent-600 uppercase">
      >> Publicaciones
    </div>
    <div class="divide-y divide-accent-900/30">
      $for(list-items)$
      <a
        href="$href$"
        class="group flex items-start justify-between gap-6 py-4 no-underline first:pt-0">
        <div class="min-w-0 flex-1">
          <div class="flex items-center gap-2">
            <span
              class="font-mono text-accent-700 transition-colors group-hover:text-accent-500"
              >▸</span
            >
            <div
              class="font-semibold tracking-tight text-stone-200 transition-colors group-hover:text-accent-400">
              $title$
            </div>
          </div>
          $if(author)$
          <div class="mt-0.5 pl-4 font-mono text-xs text-accent-700/70">
            ↳ $author$
          </div>
          $endif$ $if(body)$
          <div class="mt-0.5 pl-4 text-sm text-stone-500">
            $body$
          </div>
          $endif$
        </div>
        <div class="shrink-0 font-mono text-xs text-stone-600">
          $date$
        </div>
      </a>
      $endfor$
    </div>
  </div>
  $else$
  <div
    class="border border-dashed border-accent-900/40 px-5 py-8 text-center font-mono text-sm text-stone-500">
    [ Sin publicaciones ]
  </div>
  $endif$
</div>
